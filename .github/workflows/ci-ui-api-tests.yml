name: E2E UI + API tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-e2e:
    name: Backend e2e tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kanban
          POSTGRES_PASSWORD: kanban
          POSTGRES_DB: kanban
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kanban -d kanban"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://kanban:kanban@localhost:5432/kanban?schema=public
      JWT_SECRET: ci-test-secret

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - run: npx prisma migrate deploy

      - run: npm run test:e2e

  frontend-tests:
    name: Frontend component tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npm test

  e2e-playwright:
    name: Playwright e2e (UI + API)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install e2e dependencies
        working-directory: e2e
        run: npm ci

      - name: Typecheck e2e suite
        working-directory: e2e
        run: npx tsc --noEmit

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Start the application stack
        run: docker compose up --build -d

      - name: Wait for the stack to become healthy
        run: |
          for i in $(seq 1 60); do
            frontend_code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5173 || true)
            backend_code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/health || true)

            if [ "$frontend_code" = "200" ] && [ "$backend_code" = "200" ]; then
              echo "Stack is up (frontend=$frontend_code backend=$backend_code)"
              exit 0
            fi

            echo "Waiting for stack... (frontend=$frontend_code backend=$backend_code)"
            sleep 5
          done

          echo "Stack did not become healthy in time" >&2
          docker compose logs
          exit 1

      - name: Run Playwright tests
        working-directory: e2e
        run: npx playwright test

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

      - name: Upload raw traces/screenshots/videos on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-test-results
          path: e2e/test-results/
          retention-days: 7

      - name: Dump docker compose logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down the stack
        if: always()
        run: docker compose down -v